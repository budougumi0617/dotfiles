# cancel the key bindings for C-b
unbind C-b

# set prefix key
set -g prefix C-q

# reduce delay of key stroke
set -sg escape-time 1

# begin index of window from 1
set -g base-index 1

# begin index of pane from 1
setw -g pane-base-index 1

# reload tmux config file
bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind C-b send-prefix

# split the pane with a pipe in a vertical
bind | split-window -h

# split the pane with a pipe in a transverse
bind w split-window -v

# move between the panes in the key bindings for vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# resize the pane in the key bindings for vim
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# enable the mouse operation
setw -g mouse on

# use a 256-color terminal
set -g default-terminal "screen-256color"

# Status Line
# https://eiji.page/blog/tmux-status-line
set-option -g @c-base-100 "#001C23"
set-option -g @c-base-content "#FFD6A7"
set-option -g @c-primary "#BEFF00"
set-option -g @c-primary-content "#507000"
set-option -g @c-neutral "#003741"
set-option -g @c-neutral-content "#FFD6A7"
set-option -g @c-info "#00BAFE"
set-option -g @c-info-content "#042E49"

# Default style
set-option -g status-style "bg=#{@c-base-100}"


set-option -g status-right '#( \
  label="%m/%d(%a) %H:%M"; \
  bg="#{@c-base-100}"; \
  color="#{@c-info}"; \
  text_fg="#{@c-info-content}"; \
  echo " #[bg=$bg,fg=$color]#[bg=$color,fg=$text_fg]$label#[bg=$bg,fg=$color]"; \
)'


set-option -gw window-status-separator ""
set-option -gw window-status-format "#[bg=#{@c-base-100},fg=#{?window_bell_flag,#{@c-info},#{@c-neutral}}]#[bg=#{?window_bell_flag,#{@c-info},#{@c-neutral}},fg=#{?window_bell_flag,#{@c-info-content},#{@c-neutral-content}}] #{?window_bell_flag,󱅫 ,}#W #[bg=#{@c-base-100},fg=#{?window_bell_flag,#{@c-info},#{@c-neutral}}]"

set-option -gw window-status-current-format "#[bg=#{@c-base-100},fg=#{@c-primary}]#[bg=#{@c-primary},fg=#{@c-primary-content}] #W #[bg=#{@c-base-100},fg=#{@c-primary}]"

set-option -gw window-status-bell-style "bold"

set-option -g pane-border-lines "double"
set-option -g pane-border-style "fg=#{@c-base-content},bg=black"
set-option -g pane-active-border-style "fg=#{@c-primary},bg=white,bold"

## set the refresh interval (default 15 seconds)
set -g status-interval 60
## center shifting the position of the window list
set -g status-justify centre
## enable the visual notification
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#{@c-info}"

bind -n WheelUpPane   select-pane -t= \; copy-mode -e \; send-keys -M
bind -n WheelDownPane select-pane -t= \;                 send-keys -M

# Setting for Copy mode.
## Use vi key bind.
setw -g mode-keys vi
## Share copyboard.
# set-option -g default-command "reattach-to-user-namespace -l zsh"
## Change to oprate like as a vi.
## bind [ # Start copy mode.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

set-option -g default-shell $SHELL

# Use plugin manager
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Press prefix + I (capital I, as in Install) to fetch the plugin.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
# set -g @plugin 'catppuccin/tmux#v2.3.0
set -g @plugin 'hiroppy/tmux-agent-sidebar'
run '~/.tmux/plugins/tpm/tpm'

# set -g @catppuccin_flavor 'mocha'

# Shift+Enterで改行
# https://kurochan-note.hatenablog.jp/entry/2026/02/03/074837
bind -n S-Enter send-keys Escape "[13;2u"

# Diplay lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit
bind -r v display-popup -d '#{pane_current_path}' -w80% -h80% -E nvim .
